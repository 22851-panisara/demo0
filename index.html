<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - พอมแพม</title>
    <!-- นำเข้า Google Fonts (สารบัญ) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- นำเข้า Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .profile-container:hover {
            transform: translateY(-5px);
        }

        .profile-header {
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            position: relative;
        }

        .avatar-wrapper {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .avatar-wrapper i {
            font-size: 3.5rem;
            color: #4caf50;
        }

        .profile-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .profile-header p {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .profile-body {
            padding: 30px 25px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9fbf9;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid #4caf50;
            transition: all 0.2s ease;
        }

        .info-item:hover {
            background: #f1f8f1;
            transform: translateX(5px);
        }

        .info-icon {
            width: 40px;
            height: 40px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
        }

        .info-icon i {
            color: #2e7d32;
            font-size: 1.2rem;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 2px;
            display: block;
        }

        .info-value {
            font-size: 1.05rem;
            color: #212121;
            font-weight: 600;
        }

        .color-badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: #4caf50;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 8px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .profile-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- ส่วนหัวโปรไฟล์ -->
        <div class="profile-header">
            <div class="avatar-wrapper">
                <!-- ไอคอนผู้หญิงน่ารักๆ จาก Font Awesome -->
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <h1>ปาณิสรา ทาดวงแดน</h1>
            <p>ชื่อเล่น: พอมแพม</p>
        </div>

        <!-- ส่วนเนื้อหาข้อมูล -->
        <div class="profile-body">
            
            <!-- วันเกิด -->
            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-cake-candles"></i>
                </div>
                <div class="info-content">
                    <span class="info-label">วันเกิด</span>
                    <span class="info-value">15 ธันวาคม 2554</span>
                </div>
            </div>

            <!-- อาหารที่ชอบ -->
            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <div class="info-content">
                    <span class="info-label">อาหารที่ชอบ</span>
                    <span class="info-value">ข้าวผัด</span>
                </div>
            </div>

            <!-- สีที่ชอบ -->
            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-palette"></i>
                </div>
                <div class="info-content">
                    <span class="info-label">สีที่ชอบ</span>
                    <span class="info-value">สีเขียว <span class="color-badge"></span></span>
                </div>
            </div>

            <!-- วิชาที่ชอบ (เพิ่มใหม่) -->
            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-laptop"></i>
                </div>
                <div class="info-content">
                    <span class="info-label">วิชาที่ชอบ</span>
                    <span class="info-value">คอมพิวเตอร์</span>
                </div>
            </div>

        </div>

        <!-- ส่วนท้าย -->
        <div class="profile-footer">
            <p>Made with <i class="fa-solid fa-heart" style="color: #e91e63;"></i> My Profile</p>
        </div>
    </div>

</body>
</html>
